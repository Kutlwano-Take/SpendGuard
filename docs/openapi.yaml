openapi: 3.0.3
info:
  title: SpendGuard API
  description: Personal expense tracking and budget management API
  version: 1.0.0
  contact:
    name: SpendGuard Team
    email: support@spendguard.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://your-api-id.execute-api.af-south-1.amazonaws.com/local
    description: Production server
  - url: http://localhost:3001
    description: Local development server

security:
  - CognitoAuthorizer: []

paths:
  /expenses:
    get:
      summary: List expenses
      description: Retrieve user's expenses with optional date range filtering
      tags:
        - Expenses
      security:
        - CognitoAuthorizer: []
      parameters:
        - name: from
          in: query
          description: Start date in YYYY-MM-DD format
          required: false
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: to
          in: query
          description: End date in YYYY-MM-DD format
          required: false
          schema:
            type: string
            format: date
            example: "2026-01-31"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Expense'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create expense
      description: Create a new expense entry
      tags:
        - Expenses
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseInput'
      responses:
        '201':
          description: Expense created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenseId:
                    type: string
                    format: uuid
                    example: "123e4567-e89b-12d3-a456-426614174000"
                  createdAt:
                    type: string
                    format: date-time
                    example: "2026-01-15T09:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /expenses/{expenseId}:
    delete:
      summary: Delete expense
      description: Delete an expense by ID
      tags:
        - Expenses
      security:
        - CognitoAuthorizer: []
      parameters:
        - name: expenseId
          in: path
          required: true
          description: Expense ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expense deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Expense deleted successfully"
                  id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /budgets:
    post:
      summary: Create budget
      description: Create a new budget for a category
      tags:
        - Budgets
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetInput'
      responses:
        '201':
          description: Budget created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  budgetId:
                    type: string
                    format: uuid
                    example: "123e4567-e89b-12d3-a456-426614174000"
                  createdAt:
                    type: string
                    format: date-time
                    example: "2026-01-15T09:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /budgets/{budgetId}:
    delete:
      summary: Delete budget
      description: Delete a budget by ID
      tags:
        - Budgets
      security:
        - CognitoAuthorizer: []
      parameters:
        - name: budgetId
          in: path
          required: true
          description: Budget ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Budget deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Budget deleted successfully"
                  id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /budgets/summary:
    get:
      summary: Get budget summary
      description: Retrieve budget summary with computed spending
      tags:
        - Budgets
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BudgetSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /settings:
    get:
      summary: Get user settings
      description: Retrieve user preferences and settings
      tags:
        - Settings
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/Settings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update user settings
      description: Update user preferences and settings
      tags:
        - Settings
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsInput'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedAt:
                    type: string
                    format: date-time
                    example: "2026-01-15T09:00:00.000Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /receipts/upload-url:
    post:
      summary: Get receipt upload URL
      description: Generate a presigned URL for uploading receipt images
      tags:
        - Receipts
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - contentType
              properties:
                filename:
                  type: string
                  description: Original filename
                  example: "receipt.jpg"
                contentType:
                  type: string
                  description: MIME type
                  example: "image/jpeg"
      responses:
        '200':
          description: Upload URL generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl:
                    type: string
                    format: uri
                    description: Presigned URL for upload
                  key:
                    type: string
                    description: S3 object key
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /email/overspending-alert:
    post:
      summary: Send overspending alert
      description: Trigger an overspending alert email
      tags:
        - Notifications
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category
                - spent
                - limit
              properties:
                category:
                  type: string
                  description: Budget category
                  example: "Dining"
                spent:
                  type: number
                  format: double
                  description: Amount spent
                  example: 150.75
                limit:
                  type: number
                  format: double
                  description: Budget limit
                  example: 100.00
      responses:
        '200':
          description: Alert sent successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /email/weekly-summary:
    post:
      summary: Send weekly summary
      description: Trigger a weekly summary email
      tags:
        - Notifications
      security:
        - CognitoAuthorizer: []
      responses:
        '200':
          description: Weekly summary sent successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique expense identifier
        amount:
          type: number
          format: double
          description: Expense amount
          example: 120.50
        category:
          type: string
          description: Expense category
          example: "Dining"
        date:
          type: string
          format: date
          description: Expense date
          example: "2026-01-15"
        notes:
          type: string
          description: Optional notes about the expense
          example: "Team lunch at restaurant"
      required:
        - id
        - amount
        - category
        - date

    ExpenseInput:
      type: object
      properties:
        amount:
          type: number
          format: double
          minimum: 0
          maximum: 10000000
          description: Expense amount (0 to 10,000,000)
          example: 120.50
        category:
          type: string
          maxLength: 50
          pattern: '^[a-zA-Z0-9\s\-_&]+$'
          description: Expense category (letters, numbers, spaces, hyphens, underscores, ampersands)
          example: "Dining"
        date:
          type: string
          format: date
          description: Expense date (YYYY-MM-DD format)
          example: "2026-01-15"
        notes:
          type: string
          maxLength: 500
          description: Optional notes about the expense
          example: "Team lunch at restaurant"
      required:
        - amount
        - category

    BudgetSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Budget identifier
        category:
          type: string
          description: Budget category
          example: "Groceries"
        limit:
          type: number
          format: double
          description: Budget limit
          example: 1800.00
        spent:
          type: number
          format: double
          description: Amount spent in current period
          example: 1250.75
        period:
          type: string
          enum: [weekly, monthly]
          description: Budget period
          example: "monthly"
      required:
        - id
        - category
        - limit
        - spent
        - period

    BudgetInput:
      type: object
      properties:
        category:
          type: string
          maxLength: 50
          pattern: '^[a-zA-Z0-9\s\-_&]+$'
          description: Budget category
          example: "Groceries"
        limit:
          type: number
          format: double
          minimum: 0
          maximum: 10000000
          description: Budget limit (0 to 10,000,000)
          example: 1800.00
        period:
          type: string
          enum: [weekly, monthly]
          description: Budget period
          example: "monthly"
      required:
        - category
        - limit
        - period

    Settings:
      type: object
      properties:
        alertsEnabled:
          type: boolean
          description: Whether budget alerts are enabled
          example: true
        weeklySummary:
          type: boolean
          description: Whether weekly summary emails are enabled
          example: true
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: 3-letter currency code
          example: "ZAR"
        email:
          type: string
          format: email
          description: User email for notifications
          example: "user@example.com"

    SettingsInput:
      type: object
      properties:
        alertsEnabled:
          type: boolean
          description: Whether budget alerts are enabled
        weeklySummary:
          type: boolean
          description: Whether weekly summary emails are enabled
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: 3-letter currency code
          example: "ZAR"
        email:
          type: string
          format: email
          description: User email for notifications
          example: "user@example.com"

  responses:
    BadRequest:
      description: Bad request - invalid input parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Error description
                example: "Invalid input: amount must be a positive number"

    Unauthorized:
      description: Unauthorized - missing or invalid authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Error description
                example: "Unauthorized: No user ID found in token"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Error description
                example: "Access denied"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Error description
                example: "Expense not found"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Error description
                example: "Internal server error"

  securitySchemes:
    CognitoAuthorizer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: AWS Cognito JWT token

tags:
  - name: Expenses
    description: Expense management operations
  - name: Budgets
    description: Budget management operations
  - name: Settings
    description: User settings and preferences
  - name: Receipts
    description: Receipt upload and processing
  - name: Notifications
    description: Email notifications and alerts
