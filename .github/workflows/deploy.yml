name: Deploy SpendGuard

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: af-south-1
  NODE_VERSION: '20'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: Lint frontend
      run: |
        cd frontend
        npm run lint || echo "No lint script found"
        
    - name: Lint backend
      run: |
        cd backend
        npm run lint || echo "No lint script found"
        
    - name: Type check frontend
      run: |
        cd frontend
        npx tsc --noEmit
        
    - name: Type check backend
      run: |
        cd backend
        npx tsc --noEmit
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build
        
    - name: Build backend
      run: |
        cd backend
        npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        cd frontend && npm ci
        cd ../backend && npm ci
        
    - name: Audit frontend dependencies
      run: |
        cd frontend
        npm audit --audit-level=high
        
    - name: Audit backend dependencies
      run: |
        cd backend
        npm audit --audit-level=high

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Install SAM CLI
      run: |
        wget -q https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip
        unzip aws-sam-cli-linux-x86_64.zip -d sam-installation
        sudo ./sam-installation/install
        
    - name: Build and deploy backend
      run: |
        sam build --template-file template.yaml
        sam deploy --template-file template.yaml --stack-name spendguard-staging --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
        
    - name: Deploy frontend to Amplify
      run: |
        cd frontend
        npm ci
        npm run build
        
    - name: Configure Amplify
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Deploy to Amplify
      run: |
        aws amplify start-deployment \
          --app-id ${{ secrets.AMPLIFY_APP_ID }} \
          --branch-name develop \
          --source-url https://github.com/${{ github.repository }}/archive/${{ github.sha }}.zip

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Install SAM CLI
      run: |
        wget -q https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip
        unzip aws-sam-cli-linux-x86_64.zip -d sam-installation
        sudo ./sam-installation/install
        
    - name: Build and deploy backend
      run: |
        sam build --template-file template.yaml
        sam deploy --template-file template.yaml --stack-name spendguard-production --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset
        
    - name: Deploy frontend to Amplify
      run: |
        cd frontend
        npm ci
        npm run build
        
    - name: Configure Amplify
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Deploy to Amplify
      run: |
        aws amplify start-deployment \
          --app-id ${{ secrets.AMPLIFY_APP_ID }} \
          --branch-name main \
          --source-url https://github.com/${{ github.repository }}/archive/${{ github.sha }}.zip
          
    - name: Notify deployment
      if: always()
      run: |
        echo "🚀 Deployment completed for branch ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Repository: ${{ github.repository }}"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Install Cypress
      run: |
        cd frontend
        npx cypress install
        
    - name: Run E2E tests
      run: |
        cd frontend
        npx cypress run --config baseUrl=${{ secrets.STAGING_URL }} --record --key ${{ secrets.CYPRESS_RECORD_KEY }}
      env:
        CYPRESS_baseUrl: ${{ secrets.STAGING_URL }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: cypress-results
        path: frontend/cypress/results/
